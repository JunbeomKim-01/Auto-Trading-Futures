<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Real-time Trading Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; margin:0; padding:0; }
    header { padding:1rem; background:#222; }
    main { display:flex; height: calc(100vh - 60px); }
    #left, #right { padding:1rem; overflow:auto; }
    #left { flex: 1; }
    #right { flex: 1; border-left:1px solid #333; }
    .section { margin-bottom:1rem; }
    .section h3 { margin-bottom:0.5rem; color:#ccc; }
    #chart { width:100%; height:60vh; }
    #logs { height:20vh; overflow-y:auto; background:#222; padding:0.5rem; white-space:pre-wrap; }
    .tf-btn { margin-right:0.5rem; padding:0.3rem 0.6rem; background:#333; color:#eee; border:none; cursor:pointer; }
    .tf-btn.active { background:#555; }
    .log-list { height:15vh; overflow-y:auto; background:#222; padding:0.5rem; white-space:pre-wrap; font-family:monospace; }
    #position-table-container { overflow-x: auto; }
    #position-table {
      width: 100%;
      border-collapse: collapse;
      font-family: monospace;
    }
    #position-table th,
    #position-table td {
      padding: 0.2rem;
      border: 1px solid #333;
      text-align: center;
      font-size: 0.8rem;
    }
    #position-table th {
      background: #222;
      color: #ccc;
    }
  </style>
</head>
<body>

<header>
  <button class="tf-btn active" data-tf="1m">1분봉</button>
  <button class="tf-btn" data-tf="5m">5분봉</button>
  <button class="tf-btn" data-tf="15m">15분봉</button>
  <button class="tf-btn" data-tf="30m">30분봉</button>
  <button class="tf-btn" data-tf="1h">1시간봉</button>
  <button class="tf-btn" data-tf="4h">4시간봉</button>
  <label for="symbol-select" style="margin-left:1rem;">심볼:</label>
  <select id="symbol-select" style="padding:0.3rem; background:#333; color:#eee; border:none;">
    <option value="BTC/USDT">BTC/USDT</option>
    <option value="ETH/USDT">ETH/USDT</option>
    <option value="XRP/USDT">XRP/USDT</option>
  </select>
</header>

<main>
  <div id="left">
    <div id="chart"></div>
    <div id="logs" class="section"></div>
  </div>
  <div id="right">
    <div id="balance" class="section">
      <h3>계좌 잔고</h3>
      <div id="balance-logs" class="log-list">로딩 중…</div>
    </div>
    <div id="positions" class="section">
      <h3>포지션</h3>
      <div id="position-table-container" class="log-list">
        <table id="position-table">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Size</th>
              <th>Entry Price</th>
              <th>Break Even Price</th>
              <th>Mark Price</th>
              <th>Liq. Price</th>
              <th>Margin Ratio</th>
              <th>Margin</th>
              <th>PNL (ROI%)</th>
            </tr>
          </thead>
          <tbody>
            <!-- JS가 여기에 <tr>들을 채워 넣습니다 -->
          </tbody>
        </table>
      </div>
    </div>
    <div id="trade-logs" class="section">
      <h3>매수/매도 내역</h3>
      <div id="trade-logs-list" class="log-list">로딩 중…</div>
    </div>
  </div>
</main>

<script>
  let currentTf = '1m';
  let currentSymbol = 'BTC/USDT';
 // 2) 심볼 변경 처리
 document.getElementById('symbol-select').addEventListener('change', e => {
    currentSymbol = e.target.value;
    fetchAndPlot();
    fetchAccount();
  });


  document.querySelectorAll('.tf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTf = btn.dataset.tf;
      fetchAndPlot();
    });
  });

  const chartDiv = document.getElementById('chart');
  async function fetchAndPlot() {
    try {
      const res  = await fetch(`/data?tf=${currentTf}&symbol=${encodeURIComponent(currentSymbol)}`);
    const data = await res.json();

      const x     = data.map(d => new Date(d.timestamp));
      const open  = data.map(d => d.open);
      const high  = data.map(d => d.high);
      const low   = data.map(d => d.low);
      const close = data.map(d => d.close);

      // 볼린저 밴드
      const basis = data.map(d => d.basis);
      const upper = data.map(d => d.upper);
      const lower = data.map(d => d.lower);
      const slope = data.map(d => d.slope);

      // 캔들
      const candleTrace = {
        x, open, high, low, close,
        type: 'candlestick',
        name: currentSymbol
      };

      // 밴드 선들
      const basisTrace = {
        x, y: basis, mode: 'lines', name: 'Basis',
        line: { width: 1, dash: 'solid', color: 'yellow' }
      };
      const upperTrace = {
        x, y: upper, mode: 'lines', name: 'Upper',
        line: { width: 1, dash: 'dot', color: 'magenta' }
      };
      const lowerTrace = {
        x, y: lower, mode: 'lines', name: 'Lower',
        line: { width: 1, dash: 'dot', color: 'cyan' }
      };

      // 3) 슬로프 보조 지표 (yaxis: 'y2' 로 지정)
      const slopeTrace = {
        x, y: slope, type: 'scatter', name: 'Slope',
        xaxis: 'x', yaxis: 'y2',
        line: { width: 1.5, color: 'orange' }
      };

      // 매수/매도 마커
      const buys = data.filter(d => d.signal === 'buy');
      const sells= data.filter(d => d.signal === 'sell');
      const buyTrace = {
        x: buys.map(d => new Date(d.timestamp)),
        y: buys.map(d => d.close),
        mode: 'markers',
        marker: { symbol: 'triangle-up', size: 10, color: 'lime' },
        name: 'Buy'
      };
      const sellTrace = {
        x: sells.map(d => new Date(d.timestamp)),
        y: sells.map(d => d.close),
        mode: 'markers',
        marker: { symbol: 'triangle-down', size: 10, color: 'tomato' },
        name: 'Sell'
      };

      // 렌더
      Plotly.react(
        chartDiv,
        [candleTrace, basisTrace, upperTrace, lowerTrace, buyTrace, sellTrace, slopeTrace],
        {
          grid: { rows: 2, columns: 1, roworder: 'top to bottom', pattern: 'independent' },
          // 첫 번째 서브플롯(가격)은 domain [0.3,1], 슬로프는 [0,0.25]
          yaxis:  { domain: [0.3, 1],  title: 'Price',   gridcolor:'#333' },
          yaxis2: { domain: [0,   0.25], title: 'Slope',   gridcolor:'#333' },
          xaxis:  { rangeslider:{visible:false}, gridcolor:'#333' },
          xaxis2: { matches: 'x', showticklabels:false },  // 하단 x축은 상단과 매칭, 레이블 감춤
          margin: { t:20, b:30, l:50, r:20 },
          paper_bgcolor: '#000', plot_bgcolor: '#000',
          font: { color: '#eee' }
        }
      );
    } catch (e) {
      console.error('차트 로드 실패', e);
    }
  }
  
  // 로그 SSE
  const logDiv = document.getElementById('logs');
  const evt = new EventSource('/stream');
  evt.onmessage = e => {
    let line = e.data
      .replace(/Signal:\s*buy/, '<span style="color:lime;">Signal: buy</span>')
      .replace(/Signal:\s*sell/, '<span style="color:tomato;">Signal: sell</span>');
    logDiv.innerHTML += line + '\n';
    logDiv.scrollTop = logDiv.scrollHeight;
  };

  // 계좌·포지션·거래내역 갱신
  async function fetchAccount() {
    try {
      // 1) 세 엔드포인트를 병렬 호출
      const [balRes, posRes, trRes] = await Promise.all([
        fetch(`/account?symbol=${encodeURIComponent(currentSymbol)}`),
        fetch(`/position`),  // 모든 심볼을 돌려주던 엔드포인트
        fetch(`/trade-logs?symbol=${encodeURIComponent(currentSymbol)}`)
      ]);

      // 2) JSON 파싱
      const bal     = await balRes.json();
      const posList = await posRes.json();
      const trList  = await trRes.json();

      // --- 계좌 잔고 렌더링 ---
      const [base, quote] = currentSymbol.split('/');
      const balHtml = [
        `${(bal[base]   || 0).toFixed(6)} ${base}`,
        `${(bal[quote]  || 0).toFixed(6)} ${quote}`
      ].join('    ');
      document.getElementById('balance-logs').textContent = balHtml;

      // --- 포지션 테이블 렌더링 ---
      const tbody = document.querySelector('#position-table tbody');
      if (posList.length) {
        tbody.innerHTML = '';  // 기존 행 제거
        posList.forEach(p => {
          // 가끔 API 필드명이 다를 수 있으니 안전하게 fallback
          const side     = p.side?.toUpperCase()       || '-';
          const contracts= p.contracts                 || 0;
          const entry    = p.entryPrice?.toLocaleString()      || '-';
          const brit     = (p.breakEvenPrice ?? '-').toLocaleString();
          const mark     = p.markPrice?.toLocaleString()       || '-';
          const liq      = (p.liquidationPrice ?? '-').toLocaleString();
          const mratio   = p.marginRatio!=null 
                           ? (p.marginRatio*100).toFixed(2) + '%' 
                           : '-';
          const margin   = p.margin!=null 
                           ? p.margin.toFixed(2) 
                           : '-';
          const pnl      = p.unrealizedPnl!=null 
                           ? p.unrealizedPnl.toFixed(2) 
                           : '0.00';
          const roi      = p.unrealizedPnlPercentage!=null 
                           ? p.unrealizedPnlPercentage.toFixed(2) + '%' 
                           : '0.00%';
          const pnlColor = (p.unrealizedPnl>=0) ? 'lime' : 'tomato';

          tbody.innerHTML += `
            <tr>
              <td>${p.symbol}</td>
              <td>${side}</td>
              <td>${contracts}</td>
              <td>${entry}</td>
              <td>${brit}</td>
              <td>${mark}</td>
              <td>${liq}</td>
              <td>${mratio}</td>
              <td>${margin}</td>
              <td style="color:${p.unrealizedPnl>=0?'lime':'tomato'}">
                ${pnl} (${roi})
              </td>
            </tr>`;
        });
      } else {
        tbody.innerHTML = `<tr><td colspan="10">포지션 없음</td></tr>`;
      }

      // --- 거래내역 로그 렌더링 ---
      const tradeDiv = document.getElementById('trade-logs-list');
      if (trList.length) {
        tradeDiv.innerHTML = '';
        trList.forEach(r => {
          const time  = new Date(r.timestamp).toLocaleTimeString();
          const color = r.side==='buy' ? 'lime' : 'tomato';
          tradeDiv.innerHTML += 
            `<span style="color:${color}">
               ${time}  ${r.side.toUpperCase()}  
               ${r.price.toLocaleString()}  
               ${r.amount}
             </span>\n`;
        });
      } else {
        tradeDiv.textContent = '거래내역 없음';
      }

    } catch(e){ console.error('데이터 로드 실패', e); }
  }

  // 초기 및 5초마다
  fetchAndPlot();
  fetchAccount();
  setInterval(fetchAndPlot, 2000);
  setInterval(fetchAccount, 2000);
</script>

</body>
</html>
