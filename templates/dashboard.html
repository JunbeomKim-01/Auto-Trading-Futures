<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>Trading Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://kit.fontawesome.com/yourfontawesomekit.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:    #111;
      --card:  #1e1e1e;
      --accent:#555;
      --text:  #eee;
      --subt:  #aaa;
      --green: #4caf50;
      --red:   #f44336;
      --gap:   1rem;
    }
    * { box-sizing:border-box; }
    body { margin:0; padding:0; font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }
    header {
      position: sticky; top:0; z-index:10;
      display:flex; align-items:center; padding:var(--gap);
      background:var(--card); gap:var(--gap);
    }
    header select, header button {
      background:var(--accent); border:none; color:var(--text);
      padding:0.5em 1em; border-radius:4px; cursor:pointer;
      transition: background 0.2s;
    }
    header select:hover, header button:hover { background:var(--green); }
    header .kpi {
      margin-left:auto; font-size:0.9rem; display:flex; gap:1.5rem;
    }
    header .kpi div span { display:block; font-size:1.2rem; }

    main {
      display:grid; grid-template-columns:2fr 1fr;
      gap:var(--gap); padding:var(--gap);
      height:calc(100vh - 60px);
    }
    .card {
      background:var(--card); border-radius:6px;
      padding:var(--gap); display:flex; flex-direction:column;
      overflow:hidden;
    }
    .card h3 {
      margin:0 0 calc(var(--gap)/2); color:var(--subt);
      font-weight:normal; font-size:1rem;
    }

    /* Chart & Logs */
    #chart { flex:1; }
    #logs {
      flex:1; margin-top:var(--gap);
      background:var(--bg); overflow:auto;
      font-family:monospace; padding:0.5rem;
      border-radius:4px;
    }

    /* Position Table */
    #position-table {
      width:100%; border-collapse:collapse;
      font-size:0.85rem; margin-top:calc(var(--gap)/2);
    }
    #position-table th, #position-table td {
      padding:0.4rem; border:1px solid var(--accent);
      text-align:center;
    }
    #position-table th { background:var(--accent); }
    #position-table tr:nth-child(even) { background:#1a1a1a; }
    #position-table tr:hover { background:#2a2a2a; }

    /* Trade Log Table */
    #trade-log-table {
      width:100%; border-collapse:collapse;
      font-size:0.85rem; margin-top:calc(var(--gap)/2);
    }
    #trade-log-table th, #trade-log-table td {
      padding:0.4rem; border:1px solid var(--accent);
      text-align:center;
    }
    #trade-log-table th { background:var(--accent); color:var(--text); }
    #trade-log-table tr:nth-child(even) { background:#1a1a1a; }
    #trade-log-table tr:hover { background:#2a2a2a; }

    /* Profit Log Table */
    #profit-log-table {
      width:100%; border-collapse:collapse;
      font-size:0.85rem; margin-top:calc(var(--gap)/2);
    }
    #profit-log-table th, #profit-log-table td {
      padding:0.4rem; border:1px solid var(--accent);
      text-align:center;
    }
    #profit-log-table th { background:var(--accent); }
    #profit-log-table tr:nth-child(even) { background:#1a1a1a; }
    #profit-log-table tr:hover { background:#2a2a2a; }

    /* Balance Card */
    .balance-card { background:var(--card); border-radius:8px;
      padding:1rem; display:flex; flex-direction:column; gap:0.5rem;
    }
    .balance-header { display:flex; justify-content:space-between; align-items:center; }
    .balance-title { font-size:1rem; color:var(--subt); }
    .toggle-view { background:transparent; border:none; color:var(--accent); cursor:pointer; }
    .balance-main { display:flex; align-items:baseline; gap:1rem; }
    .balance-value { font-size:2.5rem; font-weight:bold; }
    .balance-change { font-size:0.9rem; }
    .balance-change.positive { color:var(--green); }
    .balance-change.negative { color:var(--red); }
    .balance-sparkline { height:40px; }
    .balance-legend {
      list-style:none; padding:0; margin:0;
      display:flex; gap:1rem; font-size:0.85rem;
    }
    .balance-legend li strong { color:var(--text); }
    /* ── 타임프레임 버튼 active 색상 ── */
    .tf-btn.active {
      background: var(--green);
      color: var(--text);
    }

    /* ── 24H 변동률 색상 ── */
    #kpi-24h.positive { color: var(--green); }
    #kpi-24h.negative { color: var(--red); }

  </style>
</head>
<body>

<header>
  <button id="toggle-menu"><i class="fas fa-bars"></i></button>
  <select id="symbol-select">
    <option>BTC/USDT</option>
    <option>ETH/USDT</option>
    <option>XRP/USDT</option>
  </select>
  <button class="tf-btn active" data-tf="1m">1m</button>
  <button class="tf-btn"        data-tf="5m">5m</button>
  <button class="tf-btn"        data-tf="15m">15m</button>
  <button class="tf-btn"        data-tf="30m">30m</button>
  <button class="tf-btn"        data-tf="1h">1h</button>
  <button class="tf-btn"        data-tf="4h">4h</button>
  <div class="kpi">
    <div><span id="kpi-price">--</span> 현재가</div>
    <div><span id="kpi-24h">--%</span> 24H</div>
  </div>
</header>

<main>
  <!-- 좌측: 차트 + 로그 -->
  <div class="card">
    <h3>차트</h3>
    <div id="chart"></div>
    <h3>실시간 로그</h3>
    <div id="logs"></div>
  </div>

  <!-- 우측: 잔고, 포지션, Profit, 매매내역 -->
  <div style="display:flex; flex-direction:column; gap:var(--gap);">
    <!-- 잔고 카드 -->
    <div class="card balance-card">
      <div class="balance-header">
        <span class="balance-title">총 자산</span>
        <button class="toggle-view">[⟳] USD / KRW</button>
      </div>
      <div class="balance-main">
        <span id="balance-value" class="balance-value">--</span>
        <span id="balance-change" class="balance-change"></span>
      </div>
      <div class="balance-sparkline" id="networth-sparkline"></div>
      <ul id="balance-legend" class="balance-legend">
        <li><strong>BTC</strong> -- BTC</li>
        <li><strong>USDT</strong> -- USDT</li>
      </ul>
    </div>

    <!-- 포지션 카드 -->
    <div class="card">
      <h3>포지션</h3>
      <div style="overflow-x:auto;">
        <table id="position-table">
          <thead>
            <tr>
              <th>심볼</th><th>방향</th><th>수량</th><th>진입가</th><th>손익%</th>
            </tr>
          </thead>
          <tbody><tr><td colspan="5">로딩 중…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Profit Log 카드 -->
    <div class="card">
      <h3>Profit Log</h3>
      <div style="overflow-x:auto;">
        <table id="profit-log-table">
          <thead>
            <tr>
              <th>Entry Time</th><th>Side</th>
              <th>Amount</th><th>Entry Price</th><th>Exit Price</th><th>Profit</th><th>손익%</th>
            </tr>
          </thead>
          <tbody><tr><td colspan="7">로딩 중…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 매수/매도 내역 카드 -->
    <div class="card">
      <h3>매수/매도 내역</h3>
      <div style="overflow-x:auto;">
        <table id="trade-log-table">
          <thead>
            <tr><th>시간</th><th>사이드</th><th>가격</th><th>수량</th></tr>
          </thead>
          <tbody><tr><td colspan="4">로딩 중…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
  let currentTf = '1m';
  let currentSymbol = 'BTC/USDT';
  let currentLimit = 100;
  let wheelThrottled = false;
  // 심볼 변경 핸들러
  document.getElementById('symbol-select')
    .addEventListener('change', e => {
      currentSymbol = e.target.value;
      fetchAndPlot();
      fetchAccount();
      updateKPI();
      fetchProfitLogs();
    });

  // 타임프레임 버튼
  document.querySelectorAll('.tf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTf = btn.dataset.tf;
      fetchAndPlot();
    });
  });

  // 차트 그리기 (기존 로직)
  const chartDiv = document.getElementById('chart');
  chartDiv.addEventListener('wheel', e => {
   e.preventDefault();
   if (wheelThrottled) return;            // 쓰로틀 중이면 무시
   wheelThrottled = true;
   setTimeout(() => { wheelThrottled = false; }, 200);

   // deltaY 양수/음수에 따라 작은 단위(5)로 증감
   if (e.deltaY < 0) {
     currentLimit = Math.min(currentLimit + 5, 500);
   } else {
     currentLimit = Math.max(currentLimit - 5, 20);
   }
   console.log(`🔍 limit=${currentLimit}`);
   fetchAndPlot();
  });
  async function fetchAndPlot() {
    try {
      const res  = await fetch(`/data?tf=${currentTf}&symbol=${encodeURIComponent(currentSymbol)}&limit=${currentLimit}`);
    const data = await res.json();

      const x     = data.map(d => new Date(d.timestamp));
      const open  = data.map(d => d.open);
      const high  = data.map(d => d.high);
      const low   = data.map(d => d.low);
      const close = data.map(d => d.close);

      // 볼린저 밴드
      const basis = data.map(d => d.basis);
      const upper = data.map(d => d.upper);
      const lower = data.map(d => d.lower);
      const slope = data.map(d => d.slope);
      const hi = data.map(d => d.hi);

      // 캔들
      const candleTrace = {
        x, open, high, low, close,
        type: 'candlestick',
        name: currentSymbol
      };

      // 밴드 선들
      const basisTrace = {
        x, y: basis, mode: 'lines', name: 'Basis',
        line: { width: 1, dash: 'solid', color: 'yellow' }
      };
      const upperTrace = {
        x, y: upper, mode: 'lines', name: 'Upper',
        line: { width: 1, dash: 'dot', color: 'magenta' }
      };
      const lowerTrace = {
        x, y: lower, mode: 'lines', name: 'Lower',
        line: { width: 1, dash: 'dot', color: 'cyan' }
      };

      // 3) 슬로프 보조 지표 (yaxis: 'y2' 로 지정)
      const slopeTrace = {
        x, y: slope, type: 'scatter', name: 'Slope',
        xaxis: 'x', yaxis: 'y2',
        line: { width: 1.5, color: 'orange' }
      };

      // 매수/매도 마커
      const buys = data.filter(d => d.signal === 'buy');
      const sells= data.filter(d => d.signal === 'sell');
      const buyTrace = {
        x: buys.map(d => new Date(d.timestamp)),
        y: buys.map(d => d.close),
        mode: 'markers',
        marker: { symbol: 'triangle-up', size: 10, color: 'lime' },
        name: 'Buy'
      };
      const sellTrace = {
        x: sells.map(d => new Date(d.timestamp)),
        y: sells.map(d => d.close),
        mode: 'markers',
        marker: { symbol: 'triangle-down', size: 10, color: 'tomato' },
        name: 'Sell'
      };

      // 렌더
      Plotly.react(
        chartDiv,
        [candleTrace, basisTrace, upperTrace, lowerTrace, buyTrace, sellTrace, slopeTrace],
        {
          grid: { rows: 2, columns: 1, roworder: 'top to bottom', pattern: 'independent' },
          // 첫 번째 서브플롯(가격)은 domain [0.3,1], 슬로프는 [0,0.25]
          yaxis:  { domain: [0.3, 1],  title: 'Price',   gridcolor:'#333' },
          yaxis2: { domain: [0,   0.25], title: 'Slope',   gridcolor:'#333' },
          xaxis:  { rangeslider:{visible:false}, gridcolor:'#333' },
          xaxis2: { matches: 'x', showticklabels:false },  // 하단 x축은 상단과 매칭, 레이블 감춤
          margin: { t:20, b:30, l:50, r:20 },
          paper_bgcolor: '#000', plot_bgcolor: '#000',
          font: { color: '#eee' }
        }
      );
    } catch (e) {
      console.error('차트 로드 실패', e);
    }
  }
  

  // 실시간 로그
  new EventSource('/stream').onmessage = e => {
    const logDiv = document.getElementById('logs');
    let line = e.data
      .replace(/Signal:\s*buy/, '<span style="color:lime;">Signal: buy</span>')
      .replace(/Signal:\s*sell/, '<span style="color:tomato;">Signal: sell</span>');
    logDiv.innerHTML += line + '<br>';
    logDiv.scrollTop = logDiv.scrollHeight;
  };

  // KPI 업데이트
  async function updateKPI() {
  const res = await fetch(`/ticker?symbol=${encodeURIComponent(currentSymbol)}`);
  const t   = await res.json();
  document.getElementById('kpi-price').textContent = t.last.toLocaleString();
  const pct = t.changePercent24h;
  const el  = document.getElementById('kpi-24h');

  el.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
  el.classList.toggle('positive', pct >= 0);
  el.classList.toggle('negative', pct < 0);
}

  // 잔고/포지션/매매내역 업데이트
  async function fetchAccount() {
    try {
      const [balRes, posRes, trRes] = await Promise.all([
        fetch(`/account?symbol=${encodeURIComponent(currentSymbol)}`),
        fetch(`/position`),
        fetch(`/trade-logs?symbol=${encodeURIComponent(currentSymbol)}`)
      ]);
      const bal     = await balRes.json();
      const posList = await posRes.json();
      const trList  = await trRes.json();

      // — 잔고 렌더링 —
      const [base, quote] = currentSymbol.split('/');
      const baseAmt  = bal[base]  || 0;
      const quoteAmt = bal[quote] || 0;
      document.getElementById('balance-value').textContent =
        `${quoteAmt.toLocaleString()} ${quote}`;
      document.getElementById('balance-legend').innerHTML = `
         <li><strong>${base}</strong> ${baseAmt.toFixed(6)} ${base}</li>
        <li><strong>${quote}</strong> ${quoteAmt.toLocaleString()} ${quote}</li>`;
      document.getElementById('balance-change').style.display = 'none';

      // — 포지션 렌더링 —
      const tbody = document.querySelector('#position-table tbody');
      tbody.innerHTML = posList.length
        ? posList.map(p => {
            const side    = (p.side||'').toUpperCase();
            const ctr     = p.contracts || 0;
            const ep      = p.entryPrice?.toLocaleString()||'-';
            const roi     = (p.unrealizedPnlPercentage||0).toFixed(2) + '%';
            const color   = p.unrealizedPnl>=0?'lime':'tomato';
            return `<tr>
              <td>${p.symbol}</td>
              <td>${side}</td>
              <td>${ctr}</td>
              <td>${ep}</td>
              <td style="color:${color}">${roi}</td>
            </tr>`;
          }).join('')
        : `<tr><td colspan="5">포지션 없음</td></tr>`;

      // — 매매내역 렌더링 —
      const tradeTbody = document.querySelector('#trade-log-table tbody');
      tradeTbody.innerHTML = trList.length
        ? trList.map(r => {
            const time  = new Date(r.timestamp).toLocaleTimeString();
            const side  = r.side.toUpperCase();
            const color = r.side==='buy'?'lime':'tomato';
            return `<tr style="color:${color}">
              <td>${time}</td>
              <td>${side}</td>
              <td>${Number(r.price).toLocaleString()}</td>
              <td>${r.amount}</td>
            </tr>`;
          }).join('')
        : `<tr><td colspan="4">거래내역 없음</td></tr>`;

    } catch(e) {
      console.error('데이터 로드 실패', e);
    }
  }

  // Profit Log 렌더링
  async function fetchProfitLogs() {
    try {
      const res  = await fetch(`/profit-logs?symbol=${encodeURIComponent(currentSymbol)}`);
      const logs = await res.json();
      const tbody = document.querySelector('#profit-log-table tbody');
      tbody.innerHTML = logs.length
        ? logs.map(r => {
            const et = new Date(r.entryTime).toLocaleTimeString();
            const xt = new Date(r.exitTime).toLocaleTimeString();
            const profitPct = ((r.exitPrice - r.entryPrice) / r.entryPrice * 100).toFixed(2);
            const clr= r.profit>=0?'lime':'tomato';
            return `<tr>
              <td>${et}</td>
              <td>${r.side.toUpperCase()}</td>
              <td>${r.amount}</td>
              <td>${Number(r.entryPrice).toLocaleString()}</td>
              <td>${Number(r.exitPrice).toLocaleString()}</td>
              <td style="color:${clr}">$${r.profit.toFixed(2)}</td>
              <td style="color:${clr}">${profitPct}%</td>
            </tr>`;
          }).join('')
        : `<tr><td colspan="7">Profit log 없음</td></tr>`;
    } catch(e) {
      console.error('Profit Log 로드 실패', e);
    }
  }

  // 초기 호출 및 주기 갱신
  fetchAndPlot();
  fetchAccount();
  updateKPI();
  fetchProfitLogs();
  setInterval(() => {
    fetchAndPlot();
    fetchAccount();
    updateKPI();
    fetchProfitLogs();
  }, 2000);
</script>

</body>
</html>
